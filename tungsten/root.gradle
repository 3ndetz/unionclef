// Tungsten — container project with convenience tasks
//
// Usage:
//   gradlew :tungsten:compileJava          → compiles 1.21.1
//   gradlew :tungsten:build                → builds 1.21.1
//   gradlew :tungsten:runClient            → runs MC 1.21.11 client
//   gradlew :tungsten:compile-1.21.11      → compiles 1.21.11
//   gradlew :tungsten:run-1.21.11          → runs MC 1.21.11 client

def defaultVersion = "1.21.1"
def versions = ["1.21.1", "1.21.11"]

// Default tasks delegate to 1.21.1
["compileJava", "build", "processResources", "remapJar"].each { taskName ->
    tasks.register(taskName) {
        dependsOn(":tungsten-${defaultVersion}:${taskName}")
    }
}

// runClient defaults to 1.21.11 (the version we're testing)
tasks.register("runClient") {
    dependsOn(":tungsten-1.21.11:runClient")
}

// Per-version explicit tasks
versions.each { ver ->
    tasks.register("compile-${ver}") {
        dependsOn(":tungsten-${ver}:compileJava")
    }
    tasks.register("build-${ver}") {
        dependsOn(":tungsten-${ver}:build")
    }
    tasks.register("run-${ver}") {
        dependsOn(":tungsten-${ver}:runClient")
    }
}
